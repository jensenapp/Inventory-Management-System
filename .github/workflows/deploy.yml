name: Deploy Book EMS to VPS

on:
  push:
    branches:
      - main  # 只有當程式碼推送到 main 分支時才會觸發

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 執行 SSH 連線與部署指令
        uses: appleboy/ssh-action@v1.0.3
        env:
          SECRET_DB_ROOT: ${{ secrets.DB_ROOT_PASSWORD }}
          SECRET_DB_PASS: ${{ secrets.DB_PASSWORD }}
          SECRET_JWT: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SECRET_DB_ROOT,SECRET_DB_PASS,SECRET_JWT
          script: |
            # 1. 確保伺服器上有這個資料夾，然後進入
            mkdir -p ~/book-ems-deploy
            cd ~/book-ems-deploy

            # 2. 檢查是否已經有專案檔案。沒有就 Clone，有就 Pull 更新
            if [ ! -d ".git" ]; then
              echo "首次部署：正在 Clone 儲存庫..."
              git clone https://github.com/jensenapp/Inventory-Management-System.git .
            else
              echo "更新部署：正在 Pull 最新程式碼..."
              git pull origin main
            fi

            # 3. 動態生成 .env 檔案 (改用 EOF 區塊寫法，最安全穩定)
            echo "正在建立環境變數設定檔..."
            cat <<EOF > .env
            DB_ROOT_PASSWORD=${SECRET_DB_ROOT}
            DB_PASSWORD=${SECRET_DB_PASS}
            JWT_SECRET=${SECRET_JWT}
            EOF

            # (除錯用) 檢查 .env 檔案是否成功建立，這會在 GitHub Action 的 Log 印出檔案大小
            ls -l .env

            # 4. 停止舊容器並強制重新編譯、啟動新容器
            docker compose down
            docker compose up -d --build

            # 5. 清理無用鏡像，釋放 VPS 空間
            docker image prune -f